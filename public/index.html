<!doctype html>
<html>
  <head>
    <title>Gwent WWE</title>
  </head>
  <body>
    <script src="/gameFeature/gameFetch.js"></script>
    <script src="/gameFeature/gameState.js"></script>
    <script src="/gameFeature/gameInit.js"></script>
    <script src="/gameFeature/gameLoop.js"></script>
    <script>
      initGame(1, 2).then((state) => {
        console.log("Game state ready", state);

        // Player 1 plays first card on inRing
        playCard(state, 1, 0, "inRing");

        // Player 2 plays first card on hype
        playCard(state, 2, 0, "hype");

        // Player 1 passes
        passTurn(state, 1);

        // Player 2 passes - game ends
        passTurn(state, 2);
      });
    </script>
  </body>
</html>
